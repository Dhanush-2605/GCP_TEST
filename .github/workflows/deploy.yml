name: Build and Deploy 3-Tier App

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: core-appliance-338915
  REGION: us-central1
  REPO_NAME: nodejs-repo
  IMAGE_NAME: nodejs-app
  CLUSTER_NAME: nodejs-cluster
  # Replace the line below with your exact provider string
  WORKLOAD_IDENTITY_PROVIDER: 'projects/815415208014/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
  SERVICE_ACCOUNT: 'github-actions-sa@core-appliance-338915.iam.gserviceaccount.com'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ env.SERVICE_ACCOUNT }}'

      - name: Configure Docker Auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Backend Image
        run: |
          BACKEND_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/backend:${GITHUB_SHA}"
          docker build -t $BACKEND_TAG ./backend
          docker push $BACKEND_TAG
          echo "BACKEND_TAG=$BACKEND_TAG" >> $GITHUB_ENV

      - name: Build and Push Frontend Image
        run: |
          FRONTEND_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/frontend:${GITHUB_SHA}"
          docker build -t $FRONTEND_TAG ./frontend
          docker push $FRONTEND_TAG
          echo "FRONTEND_TAG=$FRONTEND_TAG" >> $GITHUB_ENV

      - name: Connect to GKE Cluster
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: '${{ env.CLUSTER_NAME }}'
          location: '${{ env.REGION }}'

      - name: Deploy to GKE
        run: |
          # Inject the newly built image tags into the K8s manifest
          sed -i "s|BACKEND_IMAGE_PLACEHOLDER|${{ env.BACKEND_TAG }}|g" k8s.yaml
          sed -i "s|FRONTEND_IMAGE_PLACEHOLDER|${{ env.FRONTEND_TAG }}|g" k8s.yaml
          
          # Apply the architecture to the cluster
          kubectl apply -f k8s.yaml